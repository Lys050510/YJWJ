<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Module Test</title></head>
<body>
<pre id="log"></pre>
<script type="module">
const log = document.getElementById('log');
function add(msg) { log.textContent += msg + '\n'; }

try {
    add('Loading config...');
    // config.js is loaded separately as non-module
    
    add('Loading state.js...');
    await import('./js/core/state.js');
    add('  OK: state.js');
    
    add('Loading utils.js...');
    await import('./js/core/utils.js');
    add('  OK: utils.js');
    
    add('Loading dom.js...');
    await import('./js/core/dom.js');
    add('  OK: dom.js');
    
    add('Loading toast.js...');
    await import('./js/ui/toast.js');
    add('  OK: toast.js');
    
    add('Loading storage.js...');
    await import('./js/core/storage.js');
    add('  OK: storage.js');
    
    add('Loading tabs.js...');
    await import('./js/ui/tabs.js');
    add('  OK: tabs.js');
    
    add('Loading prize.js...');
    await import('./js/modules/prize.js');
    add('  OK: prize.js');
    
    add('Loading hero.js...');
    await import('./js/modules/hero.js');
    add('  OK: hero.js');
    
    add('Loading weapon.js...');
    await import('./js/modules/weapon.js');
    add('  OK: weapon.js');
    
    add('Loading player.js...');
    await import('./js/modules/player.js');
    add('  OK: player.js');
    
    add('Loading tips.js...');
    await import('./js/modules/tips.js');
    add('  OK: tips.js');
    
    add('Loading wheel.js...');
    await import('./js/modules/wheel.js');
    add('  OK: wheel.js');
    
    add('Loading scoreboard.js...');
    await import('./js/modules/scoreboard.js');
    add('  OK: scoreboard.js');
    
    add('\nALL MODULES LOADED SUCCESSFULLY!');
} catch (e) {
    add('ERROR: ' + e.message);
    add('Stack: ' + e.stack);
}
</script>
<script src="js/config.js"></script>
</body>
</html>
