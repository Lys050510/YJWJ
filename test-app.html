<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>App Test</title></head>
<body>
<h1 id="status">Starting...</h1>
<pre id="log" style="background:#111;color:#0f0;padding:10px;font-family:monospace;"></pre>

<script>
// 捕获所有错误
window.onerror = function(msg, url, line, col, err) {
    var log = document.getElementById('log');
    log.textContent += 'GLOBAL ERROR: ' + msg + '\n  at ' + url + ':' + line + '\n';
    if (err && err.stack) log.textContent += err.stack + '\n';
    document.getElementById('status').textContent = 'FAILED';
};
</script>

<!-- 先加载 config -->
<script src="js/config.js"></script>

<!-- 再加载 app 模块 -->
<script type="module" src="js/app.js"></script>
</body>
</html>
